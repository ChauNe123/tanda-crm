<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TANDA | Hệ thống Báo giá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-premium { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; outline: none; transition: 0.2s; }
        .input-premium:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2); background: #fff; }
        .label-premium { display: block; margin-bottom: 5px; font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        
        /* Glassmorphism Login */
        .glass-login {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #f97316;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden font-sans text-slate-800">

    <!-- OVERLAY ĐĂNG NHẬP -->
    <div id="loginOverlay" class="fixed inset-0 bg-[url('https://images.unsplash.com/photo-1516321497487-e288fb19713f?q=80&w=2070')] bg-cover bg-center z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="glass-login w-[400px] rounded-2xl shadow-2xl overflow-hidden relative z-10">
            <div class="p-8 text-center">
                <div class="text-slate-900 font-black text-4xl tracking-tighter mb-1">TAN<span class="text-orange-500">DA</span></div>
                <div class="text-xs text-slate-500 font-bold tracking-widest uppercase mb-6">Camera & Digital Tech</div>
                
                <div id="loginError" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 font-bold border border-red-200"></div>
                
                <div class="space-y-4 text-left">
                    <div>
                        <label class="label-premium">Tài khoản</label>
                        <input type="text" id="username" class="input-premium" value="admin">
                    </div>
                    <div>
                        <label class="label-premium">Mật khẩu</label>
                        <input type="password" id="password" class="input-premium" value="123">
                    </div>
                    <button onclick="login()" id="btnLogin" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl shadow-lg transition-all mt-4">VÀO HỆ THỐNG</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContainer" class="flex w-full h-full hidden">
        <!-- SIDEBAR FORM -->
        <div class="w-[500px] bg-white border-r border-slate-200 flex flex-col h-full shadow-lg z-10">
            <div class="bg-slate-900 p-5 border-b border-orange-500">
                <div class="text-white font-black text-2xl tracking-tighter">TAN<span class="text-orange-500">DA</span></div>
                <div class="text-[10px] text-slate-400 font-medium tracking-widest uppercase mt-0.5">Hệ thống tạo báo giá</div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 bg-slate-50">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="label-premium">Ngày lập</label><input type="date" id="docDate" class="input-premium"></div>
                    <div><label class="label-premium">Số Báo Giá</label><input type="text" id="quoteNo" value="TD-001" class="input-premium font-bold text-orange-600"></div>
                </div>
                
                <div class="bg-white p-4 rounded-xl border border-slate-200 mb-4 shadow-sm">
                    <h3 class="font-bold text-sm mb-3">Thông tin khách hàng</h3>
                    <input type="text" id="buyerName" placeholder="Tên khách hàng / Công ty" class="input-premium mb-3 font-bold">
                    <input type="text" id="buyerAddress" placeholder="Địa chỉ" class="input-premium mb-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="buyerPhone" placeholder="SĐT" class="input-premium">
                        <input type="text" id="buyerTax" placeholder="Mã số thuế" class="input-premium">
                    </div>
                </div>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="label-premium mb-0">Sản phẩm / Dịch vụ</label>
                        <button onclick="addRow()" class="bg-slate-800 text-white px-2 py-1 rounded text-[10px] uppercase font-bold">+ Thêm</button>
                    </div>
                    <div id="productList" class="space-y-3"></div>
                </div>

                <button onclick="saveQuote()" class="w-full bg-orange-50 p-3 text-orange-600 border border-orange-200 rounded-xl font-bold mt-4 hover:bg-orange-100">💾 LƯU BÁO GIÁ</button>
            </div>
        </div>

        <!-- KHU VỰC IN (PREVIEW) -->
        <div class="flex-1 bg-slate-200 p-8 overflow-y-auto">
            <div id="previewArea" class="bg-white w-[210mm] min-h-[297mm] mx-auto p-[15mm] shadow-xl">
                <!-- Template HTML Render -->
            </div>
        </div>
    </div>

    <script>
        let products = [{name: 'Camera IP TANDA', qty: 1, price: 1500000}];

        async function login() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            let res = await fetch('tanda_api.php?action=login', {
                method:'POST', body: JSON.stringify({username:u, password:p})
            });
            let data = await res.json();
            if(data.status === 'success'){
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('docDate').valueAsDate = new Date();
                renderRows();
            } else {
                document.getElementById('loginError').innerText = data.message;
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function renderRows() {
            let html = '';
            products.forEach((p, i) => {
                html += `
                <div class="bg-white p-3 rounded border border-slate-200">
                    <input type="text" value="${p.name}" onchange="products[${i}].name=this.value; renderPreview()" class="input-premium mb-2 font-bold text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" value="${p.qty}" onchange="products[${i}].qty=this.value; renderPreview()" class="input-premium text-center">
                        <input type="number" value="${p.price}" onchange="products[${i}].price=this.value; renderPreview()" class="input-premium text-right">
                    </div>
                </div>`;
            });
            document.getElementById('productList').innerHTML = html;
            renderPreview();
        }

        function addRow() { products.push({name:'', qty:1, price:0}); renderRows(); }

        function formatMoney(num) { return new Intl.NumberFormat('vi-VN').format(num) + ' đ'; }

        function renderPreview() {
            let bName = document.getElementById('buyerName').value || '.........................';
            let bAddr = document.getElementById('buyerAddress').value || '.........................';
            let qNo = document.getElementById('quoteNo').value;
            
            let total = 0;
            let rowsHtml = products.map((p, i) => {
                let sum = p.qty * p.price;
                total += sum;
                return `<tr style="border-bottom:1px solid #eee;">
                    <td style="padding:10px 5px; text-align:center;">${i+1}</td>
                    <td style="padding:10px 5px; font-weight:bold;">${p.name}</td>
                    <td style="padding:10px 5px; text-align:center;">${p.qty}</td>
                    <td style="padding:10px 5px; text-align:right;">${formatMoney(p.price)}</td>
                    <td style="padding:10px 5px; text-align:right; font-weight:bold; color:#f97316;">${formatMoney(sum)}</td>
                </tr>`;
            }).join('');

            document.getElementById('previewArea').innerHTML = `
                <div style="border-bottom: 3px solid #f97316; padding-bottom: 20px; margin-bottom: 30px; display:flex; justify-content:space-between;">
                    <div>
                        <h1 style="color:#f97316; font-size:32px; font-weight:900; margin:0;">TANDA</h1>
                        <p style="margin:0; font-size:12px; color:#666;">Giải pháp Camera & Thiết bị số</p>
                    </div>
                    <div style="text-align:right;">
                        <h2 style="margin:0; font-size:24px;">BÁO GIÁ THIẾT BỊ</h2>
                        <p style="margin:0; font-size:14px; color:#666;">Số: ${qNo}</p>
                    </div>
                </div>
                <div style="margin-bottom: 30px;">
                    <p><strong>Khách hàng:</strong> ${bName}</p>
                    <p><strong>Địa chỉ:</strong> ${bAddr}</p>
                </div>
                <table style="width:100%; border-collapse: collapse; font-size: 14px;">
                    <tr style="background:#f97316; color:white;">
                        <th style="padding:10px;">STT</th>
                        <th style="padding:10px; text-align:left;">Sản phẩm</th>
                        <th style="padding:10px;">SL</th>
                        <th style="padding:10px; text-align:right;">Đơn giá</th>
                        <th style="padding:10px; text-align:right;">Thành tiền</th>
                    </tr>
                    ${rowsHtml}
                </table>
                <div style="text-align:right; margin-top:20px; font-size:20px;">
                    <strong>Tổng cộng: <span style="color:#f97316;">${formatMoney(total)}</span></strong>
                </div>
            `;
        }

        document.getElementById('buyerName').addEventListener('input', renderPreview);
        document.getElementById('buyerAddress').addEventListener('input', renderPreview);
        document.getElementById('quoteNo').addEventListener('input', renderPreview);

        async function saveQuote() {
            let data = {
                action: 'save',
                quote_no: document.getElementById('quoteNo').value,
                doc_date: document.getElementById('docDate').value,
                buyer_name: document.getElementById('buyerName').value,
                buyer_address: document.getElementById('buyerAddress').value,
                products_json: JSON.stringify(products),
                total_amount: products.reduce((acc, p) => acc + (p.qty * p.price), 0)
            };
            await fetch('tanda_api.php?action=save', {method:'POST', body:JSON.stringify(data)});
            alert("Đã lưu báo giá thành công!");
        }
    </script>
</body>
</html>
