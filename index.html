<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script>
        if (window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            window.location.replace("mobile.html");
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>TANDA | QUOTE SYSTEM</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css">

    <style type="text/tailwindcss">
        .hidden { display: none !important; }
        .input-premium { @apply w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-[3px] focus:ring-red-500/20 focus:border-red-500 focus:bg-white block p-2.5 outline-none transition-all duration-200; }
        .label-premium { @apply block mb-1.5 text-[11px] font-bold text-slate-500 uppercase tracking-wider; }
        .tab-btn { @apply flex-1 py-3 text-center text-[11px] font-bold text-slate-500 uppercase tracking-widest transition-all duration-300 border-b-2 border-transparent cursor-pointer hover:text-red-600; }
        .tab-btn.active { @apply border-red-600 text-red-600 bg-red-50/50; }
    </style>
</head>

<body class="bg-slate-100 h-screen flex overflow-hidden font-sans text-slate-800 selection:bg-red-200">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center transition-opacity duration-500">
        <div class="bg-white w-[400px] rounded-2xl shadow-2xl overflow-hidden transform transition-all">
            <div class="bg-slate-900 p-6 text-center border-b-4 border-red-600">
                <div class="text-white font-extrabold text-2xl tracking-tight">KB<span class="text-red-500">TECH</span></div>
                <div class="text-xs text-slate-400 font-medium tracking-widest uppercase mt-1">Hệ thống quản lý nội bộ</div>
            </div>
            <div class="p-8">
                <div id="loginError" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-4 border border-red-200 text-center font-bold"></div>
                <div class="space-y-4">
                    <div><label class="label-premium">Tài khoản</label><input type="text" id="username" class="input-premium" placeholder="Nhập tài khoản..."></div>
                    <div><label class="label-premium">Mật khẩu</label><input type="password" id="password" class="input-premium" placeholder="••••••••" onkeypress="if(event.key === 'Enter') login()"></div>
                    <button onclick="login()" id="btnLogin" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-md transition-all mt-2">ĐĂNG NHẬP</button>
                </div>
            </div>
        </div>
    </div>

    <div id="appContainer" class="flex w-full h-full opacity-0 pointer-events-none transition-opacity duration-500 delay-200">
        
        <div class="w-[520px] bg-white shadow-[8px_0_24px_rgba(15,23,42,0.04)] no-print flex flex-col shrink-0 border-r border-slate-200 z-10 h-full relative">
            <div class="bg-slate-900 p-5 flex items-center justify-between border-b border-slate-800 shrink-0">
                <a href="https://app.kbtech.vn" target="_self" class="flex items-center gap-3 group cursor-pointer hover:opacity-90 transition-opacity">
                    <img src="logo.png" alt="TANDA Logo" class="h-9 w-auto object-contain drop-shadow-md group-hover:scale-110 transition-transform duration-300">
                    <div>
                        <div class="text-white font-extrabold text-xl tracking-widest uppercase">PORTAL</div>
                        <div class="text-[10px] text-slate-400 font-medium tracking-widest uppercase mt-0.5">Enterprise Document System</div>
                    </div>
                </a>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <span class="flex h-2.5 w-2.5 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                        </span>
                        <span class="text-xs text-emerald-400 font-semibold" id="currentUserDisplay">Online</span>
                    </div>
                    <button onclick="logout()" class="text-slate-400 hover:text-white transition" title="Đăng xuất"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
                </div>
            </div>

            <div class="flex border-b border-slate-200 bg-slate-50/50 shrink-0">
                <button onclick="switchTab('form-tab')" id="btn-form-tab" class="tab-btn active border-red-600 text-red-600 bg-red-50/50">Hồ sơ mới</button>
                <button onclick="switchTab('history-tab'); loadHistoryFromDB()" id="btn-history-tab" class="tab-btn hover:text-red-600">Lịch sử Báo giá</button>
                <button onclick="switchTab('order-tab'); loadOrderHistory()" id="btn-order-tab" class="tab-btn hover:text-red-600">Đơn Hàng</button>
                <button onclick="switchTab('dashboard-tab'); loadDashboard()" id="btn-dashboard-tab" class="tab-btn hover:text-red-600">Thống Kê</button>
            </div>

            <div class="flex-1 flex flex-col min-h-0 bg-white">
                <div id="form-tab" class="flex-1 overflow-y-auto custom-scroll p-6 pb-6 bg-white">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div><label class="label-premium">Ngày lập hồ sơ</label><input type="date" id="docDate" class="input-premium" onchange="handleDateChange()"></div>
                        <div><label class="label-premium">Tên Dự án (Job)</label><input type="text" id="projectName" placeholder="Vd: SERVER LƯU TRỮ..." class="input-premium" oninput="updateDoc()"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6 pb-5 border-b border-slate-100">
                        <div>
                            <label class="label-premium text-[10px] uppercase text-indigo-600">Nhân viên phụ trách</label>
                            <select id="assignedStaff" class="input-premium font-semibold text-indigo-900 bg-indigo-50/30 border-indigo-100 cursor-pointer" onchange="updateDoc()">
                                <option value="admin">Quản trị viên</option>
                                <option value="tuanhai">Lê Tuấn Hải</option>
                                <option value="myhoa">Huỳnh Mỹ Hoa</option>
								<option value="hoangduc">Nguyễn Hoàng Đức</option>
                                <option value="anhtu">Phạm Đức Anh Tú</option>
                                <option value="huukhuong">Nguyễn Hữu Khương</option>
                                <option value="thanhchau">Nguyễn Thành Châu</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-premium text-[10px] uppercase text-indigo-600">Loại đơn hàng</label>
                            <select id="docType" class="input-premium font-semibold text-indigo-900 bg-indigo-50/30 border-indigo-100 cursor-pointer" onchange="updateDoc()">
                                <option value="commercial">Thương mại (Hàng hóa)</option>
                                <option value="service">Dịch vụ (Sửa chữa, IT)</option>
                                <option value="project">Dự án (Thi công, Lắp đặt)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div><label class="label-premium">Số Báo Giá</label><input type="text" id="quoteNo" class="input-premium font-['JetBrains_Mono'] text-red-700 bg-red-50/50 font-bold border-red-200" oninput="updateDoc()"></div>
                        <div><label class="label-premium">Số Hợp đồng</label><input type="text" id="contractNo" class="input-premium font-['JetBrains_Mono'] font-bold" oninput="updateDoc()"></div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-50 to-white p-5 rounded-2xl border border-slate-200 mb-6 shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-red-500"></div>
                        
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-extrabold text-slate-800 uppercase text-[13px] tracking-wide m-0 flex items-center gap-2">Thông tin Đối tác</h3>
                            <label class="flex items-center gap-1.5 cursor-pointer bg-red-50 border border-red-200 px-2 py-1 rounded-md shadow-sm">
                                <input type="checkbox" id="isRetailCustomer" class="w-3.5 h-3.5 text-red-600 rounded cursor-pointer" onchange="toggleRetailCustomer()">
                                <span class="text-[10px] font-bold text-red-600 uppercase tracking-wide">KHÁCH LẺ</span>
                            </label>
                        </div>
                        
                        <div class="space-y-3">
                            <input type="text" id="buyerName" list="buyer-suggestions" placeholder="Tên công ty (Vd: CÔNG TY TNHH FOCUS SUCCESS)" class="input-premium font-bold text-slate-800" oninput="updateDoc()">
                            <input type="text" id="buyerAddress" placeholder="Địa chỉ trụ sở pháp lý" class="input-premium" oninput="updateDoc()">
                            <input type="text" id="deliveryAddress" placeholder="Địa chỉ giao hàng (Bỏ trống nếu trùng trụ sở)" class="input-premium border-dashed bg-transparent" oninput="updateDoc()">
                            <div class="grid grid-cols-2 gap-3"><input type="text" id="buyerTax" placeholder="Mã số thuế" class="input-premium" oninput="updateDoc()"><input type="text" id="buyerPhone" placeholder="Số điện thoại" class="input-premium" oninput="updateDoc()"></div>
                            <div class="grid grid-cols-2 gap-3"><input type="text" id="buyerRep" placeholder="Người đại diện / Người nhận" class="input-premium" oninput="updateDoc()"><input type="text" id="buyerRole" placeholder="Chức vụ" class="input-premium" oninput="updateDoc()"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="label-premium">Thanh toán (Hợp đồng)</label>
                            <select id="paymentOpt" class="input-premium cursor-pointer" onchange="updateDoc()">
                                <option value="50">Đợt 1: 50% - Đợt 2: 50%</option>
                                <option value="100">Thanh toán 100% sau khi ký</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-premium">Tùy chọn Xuất Hóa Đơn</label>
                            <div class="mt-3 flex items-center gap-2">
                                <input type="checkbox" id="includeVat" checked class="w-4 h-4 text-red-600 rounded border-slate-300 focus:ring-red-500 cursor-pointer" onchange="updateDoc()">
                                <label for="includeVat" class="text-xs font-bold text-slate-700 cursor-pointer select-none">Tính Thuế VAT (8%)</label>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <label class="label-premium mb-0">Hạng mục Sản phẩm & Dịch vụ</label>
                            <button onclick="addProductRow()" class="text-[11px] bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg font-bold transition-all shadow-sm flex items-center gap-1.5 uppercase tracking-wide">+ Thêm dòng</button>
                        </div>
                        <div id="productList" class="space-y-4 mb-6"></div>
                    </div>
                    
                    <div class="pt-6 border-t border-slate-200">
                        <button onclick="saveQuoteToDB()" id="btnSaveDB" class="w-full bg-red-50 text-red-600 border border-red-200 font-bold py-3.5 rounded-xl hover:bg-red-100 transition-all flex items-center justify-center gap-2 shadow-sm">
                            LƯU VÀO SERVER NAS
                        </button>
                    </div>
                </div>

                <div id="history-tab" class="hidden flex-1 overflow-y-auto custom-scroll p-6 pb-24 bg-slate-50/50">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-extrabold text-slate-800 text-[13px] uppercase tracking-wide">Lịch sử máy chủ</h3>
                        <button onclick="loadHistoryFromDB()" class="text-[11px] bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg hover:border-slate-400 font-bold shadow-sm uppercase">🔄 Tải lại dữ liệu</button>
                    </div>
                    <div id="historyList" class="space-y-4"></div>
                </div>

                <div id="order-tab" class="hidden flex-1 overflow-y-auto custom-scroll p-6 pb-24 bg-slate-50/50">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-extrabold text-slate-800 text-[13px] uppercase tracking-wide">Quản lý Đơn hàng</h3>
                        <button onclick="loadOrderHistory()" class="text-[11px] bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg hover:border-slate-400 font-bold shadow-sm uppercase">🔄 Tải lại</button>
                    </div>
                    <div class="mb-6"><h4 class="text-[11px] font-bold text-slate-500 uppercase mb-3 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-amber-400"></span> Chờ Xử Lý / Duyệt</h4><div id="col-pending" class="space-y-3"></div></div>
                    <div class="mb-6"><h4 class="text-[11px] font-bold text-slate-500 uppercase mb-3 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-indigo-500"></span> Đã Xuất Kho / Đang giao</h4><div id="col-exported" class="space-y-3"></div></div>
                    <div class="mb-6"><h4 class="text-[11px] font-bold text-slate-500 uppercase mb-3 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Hoàn Tất</h4><div id="col-completed" class="space-y-3"></div></div>
                </div>

                <div id="dashboard-tab" class="hidden flex-1 overflow-y-auto custom-scroll p-6 pb-24 bg-slate-50/50">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-extrabold text-slate-800 text-[13px] uppercase tracking-wide">Thống kê tháng này</h3>
                        <button onclick="loadDashboard()" class="text-[11px] bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg hover:border-slate-400 font-bold shadow-sm uppercase">🔄 Cập nhật</button>
                    </div>
                    <div class="grid gap-4">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-blue-500">
                            <div class="text-[11px] text-slate-500 font-bold uppercase tracking-wide">Doanh số Thực Tế</div>
                            <div class="text-2xl font-black text-slate-800 mt-1" id="db-total-revenue">0 ₫</div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                            <div class="text-[11px] text-slate-500 font-bold uppercase tracking-wide">Tổng số Đơn hàng</div>
                            <div class="text-2xl font-black text-slate-800 mt-1" id="db-total-orders">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="shrink-0 bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 z-20">
                <div class="flex gap-3 mb-3">
                    <button onclick="createNewDocument(false)" class="flex-1 bg-white border-2 border-slate-200 text-slate-600 font-bold py-3 rounded-xl hover:border-red-500 hover:text-red-600 transition-all text-sm">LÀM MỚI</button>
                    <button onclick="printSection('all')" class="flex-[1.5] bg-red-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-red-700 transition-all text-sm">IN TOÀN BỘ HỒ SƠ</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="printSection('quote-section')" class="flex-1 bg-slate-800 text-white font-semibold py-2 rounded-lg hover:bg-slate-900 transition-colors text-[11px] tracking-wide uppercase">Báo giá</button>
                    <button onclick="printSection('contract-section')" class="flex-1 bg-slate-800 text-white font-semibold py-2 rounded-lg hover:bg-slate-900 transition-colors text-[11px] tracking-wide uppercase">Hợp đồng</button>
                    <button onclick="printSection('acceptance-section')" class="flex-1 bg-slate-800 text-white font-semibold py-2 rounded-lg hover:bg-slate-900 transition-colors text-[11px] tracking-wide uppercase">Nghiệm thu</button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-auto custom-scroll p-4 md:p-10 print-area bg-slate-200">
            <div id="documentPreview" class="bg-white w-[210mm] min-w-[210mm] mx-auto min-h-[297mm] p-[15mm] shadow-2xl relative shrink-0"></div>
        </div>
        
    </div>
    
    <script src="assets/templates/quote.js"></script>
    <script src="assets/templates/contract.js"></script>
    <script src="assets/templates/acceptance.js"></script>
    <script src="assets/app.js?v=1.0"></script>
</body>
</html>
