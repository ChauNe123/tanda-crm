<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>TANDA | Báo Giá</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css">

    <style type="text/tailwindcss">
        /* Tối ưu UI cho mobile */
        .input-premium { @apply w-full bg-white border border-slate-200 text-slate-900 text-[16px] rounded-xl focus:ring-2 focus:ring-red-500/30 focus:border-red-500 block p-3 outline-none transition-all duration-200 shadow-sm; }
        .label-premium { @apply block mb-1.5 text-[12px] font-bold text-slate-600 uppercase tracking-wider; }
        .tab-btn { @apply flex-1 py-4 text-center text-[13px] font-bold text-slate-500 uppercase tracking-widest transition-all duration-300 border-b-2 border-transparent bg-white; }
        .tab-btn.active { @apply border-red-600 text-red-600 bg-red-50/30; }
    </style>

    <style>
        /* Chống kéo ngang và đè layout */
        body, html {
            background-color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* Đảm bảo khung A4 có thể cuộn ngang mượt mà trên điện thoại */
        .preview-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }
        /* Che bớt các phần không cần thiết khi in trên mobile */
        @media print {
            .mobile-ui-only { display: none !important; }
            #documentPreview { margin: 0 !important; }
        }
    </style>
</head>

<body class="bg-slate-50 font-sans text-slate-800 selection:bg-red-200 pb-[120px]">

    <div id="login-container"></div>

    <div id="appContainer" class="w-full opacity-0 pointer-events-none transition-opacity duration-500 delay-200">
        
        <div class="bg-slate-900 p-4 flex items-center justify-between sticky top-0 z-40 shadow-md mobile-ui-only">
            <div>
                <div class="text-white font-extrabold text-lg tracking-tight">TANDA</div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[11px] text-emerald-400 font-semibold" id="currentUserDisplay">Online</span>
                <button onclick="logout()" class="text-slate-300 hover:text-white transition text-[11px] border border-slate-600 px-2.5 py-1.5 rounded-md font-medium">Thoát</button>
            </div>
        </div>

        <div class="flex border-b border-slate-200 sticky top-[60px] z-30 shadow-sm mobile-ui-only">
            <!-- Chỉ giữ tab form, xóa các tab khác -->
        </div>

        <div id="form-tab" class="p-4 mobile-ui-only">
            
            <div class="grid grid-cols-2 gap-3 mb-5">
                <div><label class="label-premium">Ngày lập</label><input type="date" id="docDate" class="input-premium" onchange="handleDateChange()"></div>
                <div><label class="label-premium">Số Báo Giá</label><input type="text" id="quoteNo" class="input-premium font-bold text-red-700 bg-red-50" oninput="updateDoc()"></div>
            </div>

            <div class="mb-5">
                <label class="label-premium">Dự án</label>
                <input type="text" id="projectName" class="input-premium" oninput="updateDoc()">
            </div>
            
            <div class="mb-5">
                <label class="label-premium">Số Hợp đồng</label>
                <input type="text" id="contractNo" class="input-premium font-bold" oninput="updateDoc()">
            </div>
            
            <div class="bg-white p-4 rounded-2xl border border-slate-200 mb-6 shadow-sm">
                <h3 class="font-extrabold text-slate-800 uppercase mb-4 text-[13px] flex items-center gap-2 border-b pb-2">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> Thông tin Đối tác
                </h3>
                <div class="space-y-3">
                    <div><label class="text-[11px] font-semibold text-slate-500 ml-1">Tên Công Ty</label><input type="text" id="buyerName" class="input-premium font-bold" oninput="updateDoc()"></div>
                    <div><label class="text-[11px] font-semibold text-slate-500 ml-1">Địa chỉ trụ sở</label><input type="text" id="buyerAddress" class="input-premium" oninput="updateDoc()"></div>
                    <div><label class="text-[11px] font-semibold text-slate-500 ml-1">Địa chỉ giao hàng</label><input type="text" id="deliveryAddress" class="input-premium border-dashed" oninput="updateDoc()"></div>
                    
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div><label class="text-[11px] font-semibold text-slate-500 ml-1">MST</label><input type="text" id="buyerTax" class="input-premium" oninput="updateDoc()"></div>
                        <div><label class="text-[11px] font-semibold text-slate-500 ml-1">SĐT</label><input type="text" id="buyerPhone" class="input-premium" oninput="updateDoc()"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[11px] font-semibold text-slate-500 ml-1">Người ĐD</label><input type="text" id="buyerRep" class="input-premium" oninput="updateDoc()"></div>
                        <div><label class="text-[11px] font-semibold text-slate-500 ml-1">Chức vụ</label><input type="text" id="buyerRole" class="input-premium" oninput="updateDoc()"></div>
                    </div>
                </div>
            </div>

            <div class="mb-6 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                <label class="label-premium">Thanh toán</label>
                <select id="paymentOpt" class="input-premium bg-slate-50" onchange="updateDoc()">
                    <option value="50"> Thanh toán 50 / 50</option>
                    <option value="100"> Thanh toán 100%</option>
                </select>
            </div>

            <div class="flex justify-between items-center mb-4 mt-8">
                <label class="label-premium mb-0 text-red-600">Sản phẩm & Dịch vụ</label>
                <button onclick="addProductRow()" class="text-[12px] bg-slate-800 active:bg-slate-900 text-white px-4 py-2 rounded-xl font-bold transition-all shadow-md">+ Thêm SP</button>
            </div>
            
            <div id="productList" class="space-y-4 mb-6"></div>
            
            <button onclick="saveQuoteToDB()" id="btnSaveDB" class="w-full bg-red-50 text-red-600 border-2 border-red-200 font-extrabold text-[15px] py-4 rounded-xl active:bg-red-100 transition-all shadow-sm mb-6">
                LƯU LÊN NAS
            </button>
        </div>

        <div id="history-tab" class="hidden p-4 mobile-ui-only">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-extrabold text-slate-800 text-[13px] uppercase">Lịch sử máy chủ</h3>
                <button onclick="loadHistoryFromDB()" class="text-[12px] bg-white border px-4 py-2 rounded-xl font-bold shadow-sm active:bg-slate-100">🔄 Làm mới</button>
            </div>
            <div id="historyList"></div>
        </div>

        <div class="w-full mt-4 border-t-4 border-slate-200 pt-6 pb-6 bg-slate-300 preview-wrapper mobile-ui-only">
            <div class="text-center mb-4">
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">👇 Vuốt ngang để xem bản in 👇</p>
            </div>
            <div class="print-area w-max mx-auto px-4">
                <div id="documentPreview" class="bg-white w-[210mm] min-w-[210mm] min-h-[297mm] p-[15mm] shadow-lg rounded-sm origin-top left-0 relative">
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 p-3 pb-safe z-50 mobile-ui-only shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
            <div class="flex gap-2 mb-2">
                <button onclick="createNewDocument(false)" class="flex-1 bg-slate-100 border border-slate-300 text-slate-700 font-bold py-3 rounded-xl active:bg-slate-200 text-[13px]">
                    TẠO MỚI
                </button>
                <button onclick="printSection('all')" class="flex-[1.5] bg-red-600 text-white font-extrabold py-3 rounded-xl shadow-md active:bg-red-700 text-[13px]">
                    🖨️ IN TOÀN BỘ
                </button>
            </div>
            <div class="flex gap-2">
                <button onclick="printSection('quote-section')" class="flex-1 bg-slate-800 text-white font-semibold py-2.5 rounded-lg active:bg-slate-900 text-[10px] uppercase">Báo giá</button>
                <button onclick="printSection('contract-section')" class="flex-1 bg-slate-800 text-white font-semibold py-2.5 rounded-lg active:bg-slate-900 text-[10px] uppercase">Hợp đồng</button>
                <button onclick="printSection('acceptance-section')" class="flex-1 bg-slate-800 text-white font-semibold py-2.5 rounded-lg active:bg-slate-900 text-[10px] uppercase">Nghiệm thu</button>
            </div>
        </div>
        
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
